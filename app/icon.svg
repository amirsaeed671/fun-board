<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Trophy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- handles (behind the cup) -->
  <g fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round">
    <path d="M18 16 h-4 a6 6 0 0 0 0 12 h3"/>
    <path d="M46 16 h4 a6 6 0 0 1 0 12 h-3"/>
  </g>
  <!-- cup bowl -->
  <path d="M17 12 h30 v10 a15 15 0 0 1 -30 0 z" fill="url(#gold)"/>
  <!-- stem -->
  <rect x="29.5" y="34" width="5" height="8" fill="url(#gold)"/>
  <!-- pedestal -->
  <path d="M22 42 h20 l-2.5 6 h-15 z" fill="url(#gold)"/>
  <rect x="20" y="48" width="24" height="4.5" rx="2" fill="url(#gold)"/>
  <!-- shine -->
  <path d="M23 15 v4 a9 9 0 0 0 4 7" fill="none" stroke="#fffbeb" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
</svg>
